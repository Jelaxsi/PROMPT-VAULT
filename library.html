<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Library – PromptVault</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" sizes="any" />
  <link rel="shortcut icon" href="assets/icon.svg" type="image/svg+xml" />
</head>
<body class="page-library">
  <header class="pv-header">
    <nav class="pv-nav container">
      <a href="index.html" class="pv-logo">
        <span class="pv-logo-mark"></span>
        <span class="pv-logo-text">Prompt<span class="pv-logo-strong">Vault</span></span>
      </a>
      <button class="pv-theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
      <button class="pv-nav-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="pv-nav-links">
        <li><a href="library.html" class="active">Library</a></li>
        <li><a href="categories.html">Categories</a></li>
        <li><a href="submit.html">Submit</a></li>
        <li><a href="vault.html">My Vault</a></li>
      </ul>
    </nav>
  </header>

  <main class="container pv-main">
    <header class="pv-page-header">
      <h1>Prompt Library</h1>
      <p>Browse ready-to-use prompts for studying, writing, coding, and more.</p>
    </header>

    <div class="pv-toolbar">
      <input
        type="search"
        id="searchInput"
        class="pv-input"
        placeholder="Search prompts by title, category, or text..."
      />
      <select id="categoryFilter" class="pv-input pv-select">
        <option value="">All Categories</option>
      </select>
    </div>

    <section id="promptGrid" class="pv-grid pv-grid-3 pv-card-grid" aria-live="polite">
      <!-- Prompt cards injected by JavaScript -->
    </section>

    <p id="emptyState" class="pv-empty" hidden>
      No prompts found. Try a different search or category.
    </p>
  </main>

  <footer class="pv-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> PromptVault</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
